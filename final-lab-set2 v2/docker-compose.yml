version: "3.9"

services:

  # ── Databases ──────────────────────────────────────────────────────
  auth-db:
    image: postgres:15-alpine
    container_name: auth-db
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
    ports:
      - "5433:5432"
    volumes:
      - auth_data:/var/lib/postgresql/data
      - ./auth-service/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d authdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  task-db:
    image: postgres:15-alpine
    container_name: task-db
    environment:
      POSTGRES_DB: task_db
      POSTGRES_USER: task_admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5434:5432"
    volumes:
      - task_data:/var/lib/postgresql/data
      - ./task-service/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task_admin -d task_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  activity-db:
    image: postgres:15-alpine
    container_name: activity-db
    environment:
      POSTGRES_DB: activitydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret123
    ports:
      - "5435:5432"
    volumes:
      - activity_data:/var/lib/postgresql/data
      - ./activity-service/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d activitydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Services ───────────────────────────────────────────────────────
  auth-service:
    build: ./auth-service
    container_name: auth-service
    environment:
      DATABASE_URL: postgres://admin:secret123@auth-db:5432/authdb
      JWT_SECRET: ${JWT_SECRET:-dev-shared-secret}
      JWT_EXPIRES: 1h
      PORT: 3001
      NODE_ENV: development
      ACTIVITY_SERVICE_URL: http://activity-service:3003
    ports:
      - "3001:3001"
    depends_on:
      auth-db:
        condition: service_healthy
      activity-service:
        condition: service_started
    restart: unless-stopped

  task-service:
    build: ./task-service
    container_name: task-service
    environment:
      DATABASE_URL: postgres://task_admin:password123@task-db:5432/task_db
      JWT_SECRET: ${JWT_SECRET:-dev-shared-secret}
      PORT: 3002
      NODE_ENV: development
      ACTIVITY_SERVICE_URL: http://activity-service:3003
    ports:
      - "3002:3002"
    depends_on:
      task-db:
        condition: service_healthy
      activity-service:
        condition: service_started
    restart: unless-stopped

  activity-service:
    build: ./activity-service
    container_name: activity-service
    environment:
      DATABASE_URL: postgres://admin:secret123@activity-db:5432/activitydb
      JWT_SECRET: ${JWT_SECRET:-dev-shared-secret}
      PORT: 3003
      NODE_ENV: development
    ports:
      - "3003:3003"
    depends_on:
      activity-db:
        condition: service_healthy
    restart: unless-stopped

# ── Volumes ─────────────────────────────────────────────────────────
volumes:
  auth_data:
  task_data:
  activity_data:
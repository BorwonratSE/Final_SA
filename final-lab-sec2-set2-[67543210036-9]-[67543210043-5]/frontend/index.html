<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>📋 Task Board — Final Lab Sec2</title>
  <script src="config.js"></script>
  <style>
    body { font-family: sans-serif; background: #0f172a; color: white; margin: 0; display: flex; height: 100vh; }
    .hidden { display: none !important; }
    #auth-page { width: 100%; display: flex; justify-content: center; align-items: center; }
    .auth-box { background: #1e293b; padding: 2rem; border-radius: 8px; width: 300px; }
    input { width: 90%; padding: 8px; margin-bottom: 10px; }
    button { padding: 8px 16px; cursor: pointer; background: #3b82f6; color: white; border: none; border-radius: 4px; }
    .sidebar { width: 250px; background: #1e293b; padding: 1rem; display: flex; flex-direction: column; }
    .nav-item { display: block; padding: 10px; color: white; text-decoration: none; margin-bottom: 5px; cursor: pointer;}
    .content { flex: 1; padding: 2rem; }
    .task-card { background: #334155; padding: 1rem; margin-bottom: 1rem; border-radius: 4px; }
  </style>
</head>
<body>

  <div id="auth-page">
    <div class="auth-box">
      <div style="margin-bottom: 1rem;">
        <button onclick="switchTab('login')">Login</button>
        <button onclick="switchTab('register')">Register</button>
      </div>
      
      <form id="login-form" onsubmit="event.preventDefault(); doLogin();">
        <h3>Login</h3>
        <input type="email" id="l-email" placeholder="Email" required>
        <input type="password" id="l-pass" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>

      <form id="register-form" class="hidden" onsubmit="event.preventDefault(); doRegister();">
        <h3>Register</h3>
        <input type="text" id="r-user" placeholder="Username" required>
        <input type="email" id="r-email" placeholder="Email" required>
        <input type="password" id="r-pass" placeholder="Password (min 6)" required minlength="6">
        <button type="submit">Register</button>
      </form>
      <p id="auth-err" style="color: #ef4444; font-size: 14px; margin-top: 10px;"></p>
    </div>
  </div>

  <div id="app-page" class="hidden" style="width: 100%; display: flex;">
    <nav class="sidebar">
      <h2>📋 Task Board</h2>
      <button class="nav-item" style="background: #3b82f6;" onclick="showPage('tasks')">✅ Tasks</button>
      <a href="activity.html" target="_blank" class="nav-item">📅 Activity Timeline ↗</a>
      
      <div style="margin-top: auto;">
        <p id="sidebar-name"></p>
        <button onclick="doLogout()">Logout</button>
      </div>
    </nav>

    <main class="content">
      <div id="page-tasks">
        <h1>My Tasks</h1>
        <form onsubmit="event.preventDefault(); submitTask();" style="margin-bottom: 20px;">
          <input type="text" id="t-title" placeholder="Task Title" required style="width: 200px;">
          <button type="submit">+ Create</button>
        </form>
        <div id="task-list"></div>
      </div>
    </main>
  </div>

  <script>
    const AUTH = window.APP_CONFIG.AUTH_URL;
    const TASK = window.APP_CONFIG.TASK_URL;
    let token = localStorage.getItem('jwt_token');

    function switchTab(tab) {
      document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
      document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
      document.getElementById('auth-err').textContent = '';
    }

    async function doRegister() {
      const username = document.getElementById('r-user').value.trim();
      const email = document.getElementById('r-email').value.trim();
      const password = document.getElementById('r-pass').value;
      
      const res = await fetch(`${AUTH}/api/auth/register`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });
      const data = await res.json();
      if (res.ok) {
        // Login อัตโนมัติหลัง Register สำเร็จ
        const loginRes = await fetch(`${AUTH}/api/auth/login`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const loginData = await loginRes.json();
        if (loginRes.ok) {
          token = loginData.token;
          localStorage.setItem('jwt_token', token);
          initApp(loginData.user);
        }
      } else {
        document.getElementById('auth-err').textContent = data.error;
      }
    }

    async function doLogin() {
      const email = document.getElementById('l-email').value;
      const password = document.getElementById('l-pass').value;
      const res = await fetch(`${AUTH}/api/auth/login`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (res.ok) {
        token = data.token;
        localStorage.setItem('jwt_token', token);
        initApp(data.user);
      } else {
        document.getElementById('auth-err').textContent = data.error;
      }
    }

    function initApp(user) {
      document.getElementById('auth-page').classList.add('hidden');
      document.getElementById('app-page').classList.remove('hidden');
      document.getElementById('sidebar-name').textContent = `👤 ${user.username}`;
      loadTasks();
    }

    async function loadTasks() {
      const res = await fetch(`${TASK}/api/tasks`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (res.ok) {
        const tasks = await res.json();
        document.getElementById('task-list').innerHTML = tasks.map(t => `
          <div class="task-card">
            <h3>${t.title} <span style="font-size: 12px; color: #94a3b8;">(${t.status})</span></h3>
            <button onclick="updateTask(${t.id}, 'DONE')" ${t.status === 'DONE' ? 'disabled' : ''}>✓ Done</button>
            <button onclick="deleteTask(${t.id})" style="background: #ef4444;">🗑️</button>
          </div>
        `).join('');
      }
    }

    async function submitTask() {
      const title = document.getElementById('t-title').value;
      await fetch(`${TASK}/api/tasks`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, priority: 'medium' })
      });
      document.getElementById('t-title').value = '';
      loadTasks();
    }

    async function updateTask(id, status) {
      await fetch(`${TASK}/api/tasks/${id}`, {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
      loadTasks();
    }

    async function deleteTask(id) {
      if(confirm('Delete?')) {
        await fetch(`${TASK}/api/tasks/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
        loadTasks();
      }
    }

    function doLogout() {
      localStorage.removeItem('jwt_token');
      location.reload();
    }

    if (token) {
      fetch(`${AUTH}/api/auth/verify`, { headers: { 'Authorization': `Bearer ${token}` } })
        .then(res => res.json())
        .then(data => {
          if (data.valid) initApp(data.user);
          else { localStorage.removeItem('jwt_token'); token = null; }
        });
    }
  </script>
</body>
</html>

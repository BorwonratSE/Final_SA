<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>📋 Task Board — Final Lab Sec2</title>
  <script src="config.js"></script>
  <style>
    body { font-family: sans-serif; background: #0f172a; color: white; margin: 0; display: flex; height: 100vh; }
    .hidden { display: none !important; }
    #auth-page { width: 100%; display: flex; justify-content: center; align-items: center; }
    .auth-box { background: #1e293b; padding: 2rem; border-radius: 8px; width: 300px; }
    input { width: 90%; padding: 8px; margin-bottom: 10px; border-radius: 4px; border: none; }
    button { padding: 8px 16px; cursor: pointer; background: #3b82f6; color: white; border: none; border-radius: 4px; margin-right: 5px; }
    .tab-btn { background: #334155; }
    .tab-btn.active { background: #3b82f6; }
    .sidebar { width: 250px; background: #1e293b; padding: 1rem; display: flex; flex-direction: column; }
    .nav-item { display: block; padding: 10px; color: white; text-decoration: none; margin-bottom: 5px; cursor: pointer; border-radius: 4px; }
    .content { flex: 1; padding: 2rem; overflow-y: auto; }
    .task-card { background: #334155; padding: 1rem; margin-bottom: 1rem; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>

  <div id="auth-page">
    <div class="auth-box">
      <div style="margin-bottom: 1rem; display: flex;">
        <button id="btn-login" class="tab-btn active" onclick="switchTab('login')" style="flex: 1;">Login</button>
        <button id="btn-register" class="tab-btn" onclick="switchTab('register')" style="flex: 1;">Register</button>
      </div>
      
      <form id="login-form" onsubmit="event.preventDefault(); doLogin();">
        <h3 style="margin-top: 0;">เข้าสู่ระบบ</h3>
        <input type="email" id="l-email" placeholder="Email" required>
        <input type="password" id="l-pass" placeholder="Password" required>
        <button type="submit" style="width: 100%;">Login</button>
      </form>

      <form id="register-form" class="hidden" onsubmit="event.preventDefault(); doRegister();">
        <h3 style="margin-top: 0;">สมัครสมาชิกใหม่</h3>
        <input type="text" id="r-user" placeholder="Username" required>
        <input type="email" id="r-email" placeholder="Email" required>
        <input type="password" id="r-pass" placeholder="Password (ขั้นต่ำ 6 ตัว)" required minlength="6">
        <button type="submit" style="width: 100%; background: #22c55e;">Register</button>
      </form>
      
      <p id="auth-err" style="color: #ef4444; font-size: 14px; margin-top: 10px; text-align: center;"></p>
    </div>
  </div>

  <div id="app-page" class="hidden" style="width: 100%; display: flex;">
    
    <nav class="sidebar">
      <h2>📋 Task Board</h2>
      <button class="nav-item" style="background: #3b82f6;" onclick="showPage('tasks')">✅ Tasks</button>
      <a href="activity.html" target="_blank" class="nav-item" style="background: #475569;">📅 Activity Timeline ↗</a>
      
      <div style="margin-top: auto; background: #0f172a; padding: 10px; border-radius: 4px; text-align: center;">
        <p id="sidebar-name" style="margin: 0 0 10px 0; font-weight: bold;"></p>
        <button onclick="doLogout()" style="background: #ef4444; width: 100%;">Logout</button>
      </div>
    </nav>

    <main class="content">
      <div id="page-tasks">
        <h1>My Tasks</h1>
        <form onsubmit="event.preventDefault(); submitTask();" style="margin-bottom: 20px; display: flex; gap: 10px;">
          <input type="text" id="t-title" placeholder="ชื่อ Task ใหม่..." required style="width: 300px; padding: 10px;">
          <button type="submit" style="background: #22c55e;">+ Create Task</button>
        </form>
        <div id="task-list"></div>
      </div>
    </main>
  </div>

  <script>
    // ดึง URL มาจาก config.js
    const AUTH = window.APP_CONFIG.AUTH_URL;
    const TASK = window.APP_CONFIG.TASK_URL;
    let token = localStorage.getItem('jwt_token');

    // สลับหน้า Login / Register
    function switchTab(tab) {
      document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
      document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
      document.getElementById('btn-login').classList.toggle('active', tab === 'login');
      document.getElementById('btn-register').classList.toggle('active', tab === 'register');
      document.getElementById('auth-err').textContent = '';
    }

    // สมัครสมาชิก
    async function doRegister() {
      const username = document.getElementById('r-user').value.trim();
      const email = document.getElementById('r-email').value.trim();
      const password = document.getElementById('r-pass').value;
      
      try {
        const res = await fetch(`${AUTH}/api/auth/register`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();
        
        if (res.ok) {
          alert('สมัครสมาชิกสำเร็จ! กำลังเข้าสู่ระบบอัตโนมัติ...');
          // ล็อกอินอัตโนมัติ
          const loginRes = await fetch(`${AUTH}/api/auth/login`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          const loginData = await loginRes.json();
          if (loginRes.ok) {
            token = loginData.token;
            localStorage.setItem('jwt_token', token);
            initApp(loginData.user);
          }
        } else {
          document.getElementById('auth-err').textContent = data.error || 'เกิดข้อผิดพลาดในการสมัคร';
        }
      } catch (err) {
        document.getElementById('auth-err').textContent = 'เชื่อมต่อเซิร์ฟเวอร์ไม่ได้';
      }
    }

    // เข้าสู่ระบบ
    async function doLogin() {
      const email = document.getElementById('l-email').value.trim();
      const password = document.getElementById('l-pass').value;
      
      try {
        const res = await fetch(`${AUTH}/api/auth/login`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        
        if (res.ok) {
          token = data.token;
          localStorage.setItem('jwt_token', token);
          initApp(data.user);
        } else {
          document.getElementById('auth-err').textContent = data.error || 'อีเมลหรือรหัสผ่านไม่ถูกต้อง';
        }
      } catch (err) {
        document.getElementById('auth-err').textContent = 'เชื่อมต่อเซิร์ฟเวอร์ไม่ได้';
      }
    }

    // เริ่มต้นแอป
    function initApp(user) {
      document.getElementById('auth-page').classList.add('hidden');
      document.getElementById('app-page').classList.remove('hidden');
      document.getElementById('sidebar-name').textContent = `👤 ${user.username}`;
      loadTasks();
    }

    // โหลด Tasks
    async function loadTasks() {
      try {
        const res = await fetch(`${TASK}/api/tasks`, { 
          headers: { 'Authorization': `Bearer ${token}` } 
        });
        if (res.ok) {
          const tasks = await res.json();
          document.getElementById('task-list').innerHTML = tasks.map(t => `
            <div class="task-card">
              <div>
                <h3 style="margin: 0 0 5px 0;">${t.title}</h3>
                <span style="font-size: 12px; color: ${t.status === 'DONE' ? '#22c55e' : '#f59e0b'};">
                  สถานะ: ${t.status}
                </span>
              </div>
              <div>
                <button onclick="updateTask(${t.id}, 'DONE')" ${t.status === 'DONE' ? 'disabled style="background:gray;"' : ''}>✓ Done</button>
                <button onclick="deleteTask(${t.id})" style="background: #ef4444;">🗑️</button>
              </div>
            </div>
          `).join('');
        } else if (res.status === 401) {
          doLogout();
        }
      } catch (err) {
        console.error('Failed to load tasks');
      }
    }

    // สร้าง Task
    async function submitTask() {
      const title = document.getElementById('t-title').value;
      await fetch(`${TASK}/api/tasks`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, priority: 'medium' })
      });
      document.getElementById('t-title').value = '';
      loadTasks();
    }

    // อัปเดต Task
    async function updateTask(id, status) {
      await fetch(`${TASK}/api/tasks/${id}`, {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
      loadTasks();
    }

    // ลบ Task
    async function deleteTask(id) {
      if(confirm('คุณต้องการลบงานนี้ใช่หรือไม่?')) {
        await fetch(`${TASK}/api/tasks/${id}`, { 
          method: 'DELETE', 
          headers: { 'Authorization': `Bearer ${token}` } 
        });
        loadTasks();
      }
    }

    function doLogout() {
      localStorage.removeItem('jwt_token');
      location.reload();
    }

    // เช็ค Login อัตโนมัติถ้ามี Token อยู่แล้ว
    if (token) {
      fetch(`${AUTH}/api/auth/verify`, { headers: { 'Authorization': `Bearer ${token}` } })
        .then(res => res.json())
        .then(data => {
          if (data.valid) initApp(data.user);
          else { localStorage.removeItem('jwt_token'); token = null; }
        })
        .catch(() => {
          // ถ้า Backend ยังไม่เปิด ให้รอไปก่อน
        });
    }
  </script>
</body>
</html>
